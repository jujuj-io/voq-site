name: Auto-translate new content

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/en/**'
      - 'src/content/platforms/en/**'
      - 'src/i18n/pages/*.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  translate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run translation pipeline
        id: translate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/translate-content.mjs

      - name: Commit and push translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog src/content/platforms src/i18n/pages .translations
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "Auto-translate new/updated content [skip translate]"
            git push
          fi
